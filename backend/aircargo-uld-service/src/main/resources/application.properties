spring.application.name=aircargo-uld-service
server.port=9097

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:aircargo}?sslmode=disable
spring.datasource.username=${POSTGRES_USER:aircargo_user}
spring.datasource.password=${POSTGRES_PASSWORD:aircargo_pass_2024}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=false

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:aircargo}
spring.rabbitmq.password=${RABBITMQ_PASS:aircargo_pass_2024}

management.endpoints.web.exposure.include=health,info

app.jwt.secret=${JWT_SECRET:dev-only-insecure-secret-do-not-use-in-production-please-change-me}
app.jwt.expiration-ms=86400000
