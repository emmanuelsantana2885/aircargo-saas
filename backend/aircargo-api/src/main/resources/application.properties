# ─── App ────────────────────────────────────────
spring.application.name=aircargo-api
server.port=9091

# ─── PostgreSQL ────────────────────────────────__
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:aircargo}?sslmode=disable
spring.datasource.username=${POSTGRES_USER:aircargo_user}
spring.datasource.password=${POSTGRES_PASSWORD:aircargo_pass_2024}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# ─── JPA / Hibernate ─────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── Flyway ──────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ─── Actuator ────────────────────────────────────
management.endpoints.web.exposure.include=health,info
